<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // map

        let num=[4,5,6,7,8,5,3,7];

        //map
        let square=num.map(n=>n*n);
        console.log(square);

        //reduce
        let sum=num.reduce((total,n)=>total+n);
        console.log(sum);
        //filter
        let sorting=num.filter(n=>n>2);
        console.log(sorting);
        //foreach
        num.forEach(n=>console.log(n*2));

        //local storage :-

        let myInfo={
            name: 'sandesh',
            email: 'sandesh4569@gmail.com',
            mob:9595959599,
            age:20,
        };

        // store the object
        localStorage.setItem('myInfo', JSON.stringify(myInfo));

        //retrieve data 

        let storeData=JSON.parse(localStorage.getItem('myInfo'));
        console.log(storeData.name);
        

    </script>
</body>
</html>
